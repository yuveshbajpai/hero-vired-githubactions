name: java trigger demo

on:
 push:
  branches:
   - main

jobs:
  java-demo-job:
    runs-on: ubuntu-22.04

    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: install java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: '17'
      - name: show version
        run: java --version
      - name: compile file
        run: javac hello_world.java
      - name: run file
        run: java hello_world


      
